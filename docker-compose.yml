services:
  db:
    image: postgres:15
    container_name: pdam_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: pdam
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pdam_db_data:/var/lib/postgresql/data
    ports:
      - 5432:5432

  prometheus:
    image: prom/prometheus:latest
    container_name: pdam_prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - 9090:9090

  backend:
    build: .
    container_name: pdam_backend
    depends_on:
      - db
      - prometheus
      - metrics_exporter
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/pdam
      PROMETHEUS_URL: http://prometheus:9090
      PORT: 3000
    ports:
      - 3000:3000
    # volume bind removed so container uses built image (preserve installed node_modules)

  metrics_exporter:
    build: .
    container_name: pdam_metrics_exporter
    command: node metrics-exporter.js
    ports:
      - 9100:9100
    environment:
      METRICS_PORT: 9100
    depends_on:
      - db

volumes:
  pdam_db_data:
